<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gandi Jahnavi | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            scroll-behavior: smooth;
        }
        h1, h2, h3, h4, .font-outfit {
            font-family: 'Outfit', sans-serif;
        }
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .bg-tech-gradient {
            background: radial-gradient(circle at top left, rgba(59, 130, 246, 0.05), transparent),
                        radial-gradient(circle at bottom right, rgba(147, 51, 234, 0.05), transparent);
        }
        
        /* Custom Animations */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        @keyframes float3d {
            0%, 100% {
                transform: translateY(0) rotateX(0deg) rotateY(0deg);
            }
            50% {
                transform: translateY(-20px) rotateX(5deg) rotateY(5deg);
            }
        }
        
        @keyframes rotate3d {
            0% {
                transform: perspective(1000px) rotateY(0deg);
            }
            100% {
                transform: perspective(1000px) rotateY(360deg);
            }
        }
        
        @keyframes rotateSlow {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        @keyframes rotateReverse {
            0% {
                transform: rotate(360deg);
            }
            100% {
                transform: rotate(0deg);
            }
        }
        
        @keyframes spinOrbit {
            0% {
                transform: rotate(0deg) translateX(150px) rotate(0deg);
            }
            100% {
                transform: rotate(360deg) translateX(150px) rotate(-360deg);
            }
        }
        
        @keyframes tilt {
            0%, 100% {
                transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
            }
            25% {
                transform: perspective(1000px) rotateX(5deg) rotateY(-5deg);
            }
            50% {
                transform: perspective(1000px) rotateX(0deg) rotateY(0deg);
            }
            75% {
                transform: perspective(1000px) rotateX(-5deg) rotateY(5deg);
            }
        }
        
        .perspective-3d {
            perspective: 1500px;
            transform-style: preserve-3d;
        }
        
        .transform-3d {
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }
        
        .transform-3d:hover {
            transform: perspective(1000px) rotateX(10deg) rotateY(-10deg) translateZ(20px);
        }
        
        .card-3d {
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }
        
        .card-3d:hover {
            transform: perspective(1000px) rotateX(-10deg) rotateY(10deg) scale(1.05);
        }
        
        .shadow-3d {
            box-shadow: 0 20px 60px -10px rgba(0, 0, 0, 0.2),
                        0 10px 30px -5px rgba(59, 130, 246, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        
        .shadow-3d-hover {
            transition: box-shadow 0.3s ease, transform 0.3s ease;
        }
        
        .shadow-3d-hover:hover {
            box-shadow: 0 30px 80px -15px rgba(0, 0, 0, 0.3),
                        0 15px 40px -10px rgba(59, 130, 246, 0.3),
                        inset 0 2px 0 rgba(255, 255, 255, 0.4);
            transform: translateZ(30px);
        }
        
        .animate-blink {
            animation: blink 1s infinite;
        }
        
        .animate-fade-in {
            animation: fadeIn 0.8s ease-out;
        }
        
        .animate-slide-up {
            animation: slideUp 0.8s ease-out;
        }
        
        .animate-slide-up-delay {
            animation: slideUp 0.8s ease-out 0.2s both;
        }
        
        .animate-gradient {
            animation: gradient 3s ease infinite;
        }
        
        .animate-float3d {
            animation: float3d 4s ease-in-out infinite;
        }
        
        .animate-tilt {
            animation: tilt 6s ease-in-out infinite;
        }
        
        .animate-rotate-slow {
            animation: rotateSlow 20s linear infinite;
        }
        
        .animate-rotate-medium {
            animation: rotateSlow 15s linear infinite;
        }
        
        .animate-rotate-fast {
            animation: rotateSlow 10s linear infinite;
        }
        
        .animate-rotate-reverse {
            animation: rotateReverse 25s linear infinite;
        }
        
        .animate-spin-orbit {
            animation: spinOrbit 30s linear infinite;
        }
        
        .delay-1000 {
            animation-delay: 1s;
        }
    </style>
